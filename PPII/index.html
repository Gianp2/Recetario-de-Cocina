<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Cocinando Fácil | Web para armar tu receta</title>
</head>
<body>
    <main id="mainContent">
        <h2>Armá tu receta 📝</h2>
        <p>Este espacio es para que vos, <span>Chef</span> 👨🏻‍🍳, puedas cargar tus recetas.</p>

        <!-- Sección de formulario para recetas -->
        <section class="form-section">
            <h2>Crear Receta</h2>
            <form id="recipe-form">
                <label for="recipe-name">Nombre de la receta:</label>
                <input type="text" id="recipe-name" required>

                <label for="ingredient-search">Buscar ingredientes:</label>
                <input type="text" id="ingredient-search" placeholder="Escribe para buscar...">

                <label for="ingredient-select">Seleccionar ingredientes:</label>
                <select id="ingredient-select" multiple></select>

                <button type="button" id="add-ingredients-btn">Añadir Ingredientes</button>

                <!-- Ingredientes seleccionados -->
                <div id="selected-ingredients"></div>

                <label for="steps">Pasos:</label>
                <textarea id="steps" required></textarea>

                <button type="submit">Guardar Receta</button>
            </form>
        </section>

        <!-- Sección de recetas guardadas -->
        <section id="recipes-section">
            <h2>Recetas Guardadas</h2>
            <div id="recipes-list">
                <!-- Aquí se agregarán las recetas dinámicamente -->
            </div>
        </section>

        <section class="recipes-section">
            <div id="recipeList"></div>
            <button id="clearRecipes">Borrar Todas las Recetas</button>
        </section>

        <!-- Sección de comentarios -->
        <section id="comments-section">
            <h2>Comentarios</h2>
            <form id="comment-form">
                <label for="name">Nombre:</label>
                <input type="text" id="name" required>
                <label for="email">Correo:</label>
                <input type="text" id="email" required>
                <label for="comment">Deja tu comentario:</label>
                <textarea id="comment" required></textarea>

                <button type="submit">Enviar Comentario</button>
            </form>
            <div id="comments-list"></div>
        </section>
    </main>

    <!-- Popup para ingresar la cantidad de ingredientes -->
    <div id="ingredient-popup" class="popup">
        <div class="popup-content">
            <h3 id="popup-title">¿Cuántos necesitas?</h3>
            <input type="number" id="ingredient-quantity" min="1" value="1">
            <div class="popup-buttons">
                <button id="confirm-quantity">Confirmar</button>
                <button id="cancel-quantity">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script> <!-- Librería jsPDF -->
    <script>
        emailjs.init("hqLFCpK3qVkTF0Fdk");

        // Ejemplo básico de cómo agregar una receta (ajústalo según tu lógica actual en scripts.js)
        document.getElementById('recipe-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('recipe-name').value;
            const ingredients = Array.from(document.querySelectorAll('#selected-ingredients .ingredient')).map(i => i.textContent);
            const steps = document.getElementById('steps').value;

            const recipeDiv = document.createElement('div');
            recipeDiv.classList.add('recipe');
            recipeDiv.innerHTML = `
                <h3>${name}</h3>
                <p><strong>Ingredientes:</strong> ${ingredients.join(', ')}</p>
                <p><strong>Pasos:</strong> ${steps}</p>
                <button onclick="printRecipe('${name}', '${ingredients.join(', ')}', '${steps}')">Imprimir Receta</button>
            `;
            document.getElementById('recipes-list').appendChild(recipeDiv);

            this.reset(); // Resetea el formulario
        });

        // Función para imprimir la receta
        function printRecipe(name, ingredients, steps) {
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head><title>${name}</title></head>
                <body>
                    <h1>${name}</h1>
                    <h2>Ingredientes</h2>
                    <p>${ingredients}</p>
                    <h2>Pasos</h2>
                    <p>${steps}</p>
                    <script>window.print(); window.close();<\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        function downloadRecipeAsPDF(name, ingredients, steps) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text(name, 10, 10);
            doc.text("Ingredientes:", 10, 20);
            doc.text(ingredients, 10, 30);
            doc.text("Pasos:", 10, 40);
            doc.text(steps, 10, 50);
            doc.save(`${name}.pdf`);
        }
    </script>
    <script src="js/scripts.js"></script>
<footer>
        <p>Desarrollado para Escuela Especial N° 1030</p>
        <p>© 2025 Todos los derechos reservados.</p>
    </footer>
</body>
</html>
